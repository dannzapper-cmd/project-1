name: CI

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Optional deployed backend URL for smoke checks"
        required: false
        type: string
      frontend_origin:
        description: "Optional Vercel origin for CORS preflight smoke"
        required: false
        type: string

jobs:
  frontend:
    name: Frontend build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./leadforge.test.db
      RATE_LIMIT_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: pytest -q
        working-directory: backend

  deploy-smoke:
    name: Optional deployed backend smoke
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_url != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Health/status smoke with Render cold-start retry
        env:
          BACKEND_URL: ${{ inputs.backend_url }}
          FRONTEND_ORIGIN: ${{ inputs.frontend_origin }}
        run: bash scripts/smoke-check.sh

